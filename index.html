<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JK Brand Bracelet</title>

<meta name="description" content="JK Brand Bracelet - Premium adjustable bracelet for men and women. Order directly on WhatsApp.">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f6f6f6;
color:#333;
}

/* HERO */

.hero{
background:linear-gradient(120deg,#111,#333);
color:white;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
opacity:0.9;
}

/* PRODUCT SECTION */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}

/* GALLERY */

.gallery img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* PRODUCT INFO */

.product-title{
font-size:28px;
margin-bottom:10px;
}

.price{
font-size:24px;
color:#0a7;
margin-bottom:15px;
}

.desc{
margin-bottom:20px;
line-height:1.5;
}

/* SELECTORS */

.selector{
margin-bottom:20px;
}

.selector label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

.size-options button{
padding:10px 16px;
margin-right:8px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.size-options button.active{
background:#111;
color:white;
}

/* COLOR SWATCHES */

.colors{
display:flex;
gap:10px;
}

.color{
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
border:2px solid transparent;
}

.color.active{
border:2px solid black;
}

/* FORM */

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */

.order-btn{
background:#25D366;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:8px;
color:white;
cursor:pointer;
}

.order-btn:hover{
opacity:0.9;
}

footer{
text-align:center;
padding:30px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<section class="hero">
<h1>JK Brand Bracelet</h1>
<p>Premium adjustable bracelet for everyday style</p>
</section>

<section class="container">

<!-- PRODUCT IMAGES -->

<div class="gallery">

<img src="https://picsum.photos/500/400?1" alt="JK bracelet image 1">
<img src="https://picsum.photos/500/400?2" alt="JK bracelet image 2">
<img src="https://picsum.photos/500/400?3" alt="JK bracelet image 3">

</div>


<!-- PRODUCT DETAILS -->

<div>

<h2 class="product-title">JK Brand Bracelet</h2>

<div class="price">PKR 999</div>

<p class="desc">
Premium quality bracelet designed for comfort and style.  
Made with durable materials and an adjustable fit suitable for daily wear.
Perfect for both men and women.
</p>


<!-- SIZE -->

<div class="selector">
<label>Size</label>

<div class="size-options">

<button onclick="selectSize(this,'Small')">Small</button>
<button onclick="selectSize(this,'Medium')">Medium</button>
<button onclick="selectSize(this,'Large')">Large</button>

</div>
</div>


<!-- COLOR -->

<div class="selector">
<label>Color</label>

<div class="colors">

<div class="color" style="background:black"
onclick="selectColor(this,'Black')"></div>

<div class="color" style="background:silver"
onclick="selectColor(this,'Silver')"></div>

<div class="color" style="background:gold"
onclick="selectColor(this,'Gold')"></div>

</div>
</div>


<!-- QUANTITY -->

<div class="selector">

<label>Quantity</label>

<input type="number" id="qty" value="1" min="1">

</div>


<!-- CUSTOMER DETAILS -->

<div class="selector">

<label>Your Name</label>
<input id="name" placeholder="Enter your name">

<label>Phone Number</label>
<input id="phone" placeholder="03XXXXXXXXX">

<label>Address</label>
<input id="address" placeholder="City / Address">

</div>


<button class="order-btn" onclick="orderWhatsApp()">
Order on WhatsApp
</button>

</div>

</section>

<footer>
© 2026 JK Brand
</footer>


<script>

/* STATE */

let selectedSize = ""
let selectedColor = ""


/* SIZE SELECTOR */

function selectSize(btn,size){

document.querySelectorAll(".size-options button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

selectedSize = size

}


/* COLOR SELECTOR */

function selectColor(el,color){

document.querySelectorAll(".color")
.forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedColor = color

}


/* WHATSAPP ORDER */

function orderWhatsApp(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const address=document.getElementById("address").value
const qty=document.getElementById("qty").value

if(!name || !phone || !selectedSize || !selectedColor){

alert("Please fill all details and select size/color")

return

}

const message =
`New Order - JK Brand Bracelet

Name: ${name}
Phone: ${phone}
Address: ${address}

Product: JK Brand Bracelet
Size: ${selectedSize}
Color: ${selectedColor}
Quantity: ${qty}

Price: 999 PKR each`

const url =
`https://wa.me/923335100189?text=${encodeURIComponent(message)}`

window.open(url,"_blank")

}

</script>

</body>
</html>
